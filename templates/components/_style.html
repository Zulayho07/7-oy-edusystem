<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --nav-h: 64px;
    --rail-h: 80px;
    --bg:      #0e0f11;
    --bg2:     #16181c;
    --bg3:     #1e2126;
    --border:  rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text:    #f0ede8;
    --muted:   rgba(240,237,232,0.45);
    --accent:  #c8f06e;
    --serif:   'DM Serif Display', Georgia, serif;
    --sans:    'DM Sans', system-ui, sans-serif;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
  }

  a { text-decoration: none; color: inherit; }

  /* ── main content offset ── */
  .main-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    height: var(--nav-h);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem;
    background: rgba(14,15,17,0.9);
    backdrop-filter: blur(14px);
    border-bottom: 0.5px solid var(--border);
  }
  .navbar-logo {
    font-family: var(--serif);
    font-size: 1.3rem;
    color: var(--text);
  }
  .navbar-logo span { color: var(--accent); }

  .navbar-links {
    display: flex; align-items: center; gap: 4px; list-style: none;
  }
  .navbar-links a {
    color: var(--muted); font-size: 0.85rem;
    padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
  }
  .navbar-links a:hover,
  .navbar-links a.active { color: var(--text); background: rgba(255,255,255,0.07); }

  /* ── COURSE RAIL ── */
  .rail-wrapper {
    position: sticky; top: var(--nav-h); z-index: 90;
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    overflow: hidden;
  }
  .rail {
    display: flex; align-items: center;
    overflow-x: auto; padding: 0 1.5rem;
    scrollbar-width: none;
  }
  .rail::-webkit-scrollbar { display: none; }

  .rail-item {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; padding: 0 18px; height: var(--rail-h);
    min-width: 120px; flex-shrink: 0;
    background: none; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); font-family: var(--sans);
    cursor: pointer; transition: all 0.2s;
    text-decoration: none;
  }
  .rail-item:hover  { color: var(--text); background: rgba(255,255,255,0.03); }
  .rail-item.active { color: var(--text); border-bottom-color: var(--accent); }

  .rail-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem; background: rgba(255,255,255,0.06);
    transition: transform 0.2s;
  }
  .rail-item:hover .rail-icon,
  .rail-item.active .rail-icon { transform: translateY(-1px); }

  .rail-label { font-size: 0.72rem; font-weight: 500; white-space: nowrap; }
  .rail-count {
    font-size: 0.62rem; padding: 1px 6px; border-radius: 20px;
    background: rgba(255,255,255,0.07);
  }
  .rail-item.active .rail-count {
    background: rgba(200,240,110,0.15); color: var(--accent);
  }

  /* ── KURS KARTOCHKALARI (index) ── */
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    margin-top: 1.5rem;
  }
  .course-card {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 14px; padding: 1.25rem;
    transition: all 0.2s; cursor: pointer;
    display: block;
  }
  .course-card:hover {
    background: var(--bg3); border-color: var(--border2);
    transform: translateY(-2px);
  }
  .course-card-icon {
    width: 42px; height: 42px; border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; margin-bottom: 12px;
    background: rgba(200,240,110,0.1);
  }
  .course-card-name {
    font-size: 0.95rem; font-weight: 500; color: var(--text); margin-bottom: 4px;
  }
  .course-card-meta {
    font-size: 0.78rem; color: var(--muted); margin-bottom: 12px;
  }
  .course-card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; border-top: 0.5px solid var(--border);
  }
  .course-card-count { font-size: 0.75rem; color: var(--muted); }
  .course-card-price {
    font-size: 0.8rem; font-weight: 600; color: var(--accent);
  }

  /* ── TALABALAR GRID ── */
  .students-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
    margin-top: 1rem;
  }
  .student-card {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1rem;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.18s;
  }
  .student-card:hover {
    background: var(--bg3); border-color: var(--border2);
    transform: translateY(-1px);
  }
  .student-avatar {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: rgba(200,240,110,0.2); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; font-weight: 600;
  }
  .student-name { font-size: 0.875rem; font-weight: 500; color: var(--text); }
  .student-phone { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .student-age {
    margin-left: auto; font-size: 0.68rem; font-weight: 500;
    padding: 2px 8px; border-radius: 20px;
    background: rgba(255,255,255,0.06); color: var(--muted);
  }

  /* ── DETAIL PAGE ── */
  .detail-hero {
    display: flex; align-items: flex-start; gap: 1.25rem;
    padding-bottom: 1.75rem; margin-bottom: 1.75rem;
    border-bottom: 0.5px solid var(--border);
  }
  .detail-hero-icon {
    width: 60px; height: 60px; border-radius: 16px; flex-shrink: 0;
    background: rgba(200,240,110,0.1);
    display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  }
  .detail-title {
    font-family: var(--serif); font-size: 1.9rem; line-height: 1.2;
    color: var(--text); margin-bottom: 6px;
  }
  .detail-meta { font-size: 0.85rem; color: var(--muted); }

  .detail-stats {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: var(--border);
    border: 0.5px solid var(--border); border-radius: 12px;
    overflow: hidden; margin-bottom: 2rem;
  }
  .stat-box { background: var(--bg2); padding: 1.1rem 1.25rem; }
  .stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-family: var(--serif); font-size: 1.5rem; color: var(--text); }

  .section-label {
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.07em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
  }

  /* ── FOOTER ── */
  .footer {
    border-top: 0.5px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    font-size: 0.78rem; color: var(--muted);
  }
  .footer span { color: var(--accent); }

  /* ── EMPTY ── */
  .empty {
    text-align: center; padding: 3rem; color: var(--muted); font-size: 0.9rem;
  }
</style>
